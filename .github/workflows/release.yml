name: Create Release

# Версия релиза НЕ принимается как input — берётся из единственного источника
# правды scripts/_xkeen/01_info/01_info_variable.sh (xkeen_current_version
# + xkeen_build). Чтобы выпустить новый релиз: обнови переменные в variable file,
# запушь, потом запусти этот workflow вручную (workflow_dispatch).
# prerelease выводится из xkeen_build: всё, что не "Stable" — pre-release.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          # POSIX sh, error-уровень. Релиз не поедет если есть синтаксические ошибки.
          find scripts install.sh -name '*.sh' -type f -print0 \
            | xargs -0 shellcheck -s sh -S error
          shellcheck -s sh -S error scripts/xkeen

      - name: Validate assembled S05xkeen init script
        run: |
          # См. package-folder.yml — то же самое для релиза.
          assembled=$(mktemp)
          sh scripts/_xkeen/02_install/07_install_register/init/_assemble.sh > "$assembled"
          sh -n "$assembled"
          rm -f "$assembled"
          echo "Assembled S05xkeen syntax OK"

      - name: Read version and build channel from variable file
        run: |
          # Единственный источник правды для версии XKeen.
          var_file="scripts/_xkeen/01_info/01_info_variable.sh"
          version=$(sed -n 's/^xkeen_current_version="\([^"]*\)".*/\1/p' "$var_file" | head -n 1)
          build=$(sed -n 's/^xkeen_build="\([^"]*\)".*/\1/p' "$var_file" | head -n 1)
          if [ -z "$version" ]; then
            echo "ERROR: не удалось распарсить xkeen_current_version из $var_file"
            exit 1
          fi
          # Тег: "2.0" для Stable, "2.0-beta" для Beta, "2.0-rc1" для RC1, и т.д.
          # Это даёт чистые semver-подобные теги без пробелов в URL.
          if [ -n "$build" ] && [ "$build" != "Stable" ]; then
            tag="${version}-$(echo "$build" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')"
            release_name="${version} ${build}"
            prerelease="true"
          else
            tag="${version}"
            release_name="${version}"
            prerelease="false"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BUILD=${build}" >> "$GITHUB_ENV"
          echo "TAG=${tag}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${release_name}" >> "$GITHUB_ENV"
          echo "PRERELEASE=${prerelease}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=xkeen.tar.gz" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME_TAR=xkeen.tar" >> "$GITHUB_ENV"
          echo "Releasing: ${release_name} (tag ${tag}, prerelease=${prerelease})"
          
      - name: Prepare scripts with build timestamp
        run: |
          export TZ="Europe/Moscow"
          BUILD_TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S MSK")
          mkdir -p scripts_for_release
          cp -r scripts/* scripts_for_release/

          sed -i "s/^build_timestamp=\".*\"/build_timestamp=\"$BUILD_TIMESTAMP\"/" \
            scripts_for_release/_xkeen/01_info/01_info_variable.sh
          
      - name: Create release archive
        run: |
          mkdir -p dist
          cd scripts_for_release
          chmod +x xkeen

          find . -type f -o -type l | sed 's|^\./||' | tar -czf "../dist/${ARCHIVE_NAME}" -T -
          find . -type f -o -type l | sed 's|^\./||' | tar -cf "../dist/${ARCHIVE_NAME_TAR}" -T -
          cd ..
          sha256sum "dist/${ARCHIVE_NAME}" | awk '{print $1}' > "dist/${ARCHIVE_NAME}.sha256"
          sha256sum "dist/${ARCHIVE_NAME_TAR}" | awk '{print $1}' > "dist/${ARCHIVE_NAME_TAR}.sha256"

      - name: Clean up temporary files
        run: |
          rm -rf scripts_for_release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.PRERELEASE }}
          files: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
            dist/${{ env.ARCHIVE_NAME_TAR }}
            dist/${{ env.ARCHIVE_NAME_TAR }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
